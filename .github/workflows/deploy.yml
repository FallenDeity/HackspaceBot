name: Deploy

on:
  workflow_run:
    workflows: ["Code formatter and linter"]
    types: [completed]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy without waiting for formatter/linter workflow result'
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && inputs.force_deploy) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install

      - name: Install Dependencies
        run: |
          uv sync --locked --all-groups

      - name: Write env
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
          echo "JISHAKU_HIDE=${{ secrets.JISHAKU_HIDE }}" >> .env
          echo "DB_DIR=${{ secrets.DB_DIR }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env

      - name: Ensure pm2 daemon is running
        run: |
          pm2 ping || pm2 resurrect || true

      - name: Deploy
        run: |
          if pm2 describe hackspace-bot >/dev/null 2>&1; then
            PYTHONOPTIMIZE=1 pm2 restart hackspace-bot --update-env
          else
            PYTHONOPTIMIZE=1 pm2 start "uv run __main__.py" --name hackspace-bot --log /tmp/runners/hackspace-bot.log
          fi
          pm2 save

      - name: Health Check
        run: |
          sleep 5
          for i in {1..10}; do
            if pm2 logs hackspace-bot --lines 100 --nostream | grep -q "Ready!"; then
              echo "Bot is ready!"
              exit 0
            fi
            echo "Bot not ready yet. Attempt $i/10. Retrying in 5 seconds..."
            sleep 5
          done
          echo "Bot failed to become ready after 10 attempts. Logs:"
          pm2 logs hackspace-bot --lines 100 --nostream
          exit 1
